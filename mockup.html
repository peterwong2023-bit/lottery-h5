<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>H5 手机预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(168,85,247,0.12) 0%, transparent 50%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    gap: 48px;
    flex-wrap: wrap;
    padding: 40px 20px;
  }

  .device-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .device-label {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ========== iPhone 15 Pro ========== */
  /* Real: 393×852, scale 0.72 → screen 283×614 → frame 283+28=311, 614+28=642 */
  .iphone {
    --scale: 0.72;
    --device-w: 393px;
    --device-h: 852px;
    --pad: 14px;
    --screen-w: calc(var(--device-w) * var(--scale));
    --screen-h: calc(var(--device-h) * var(--scale));
    width: calc(var(--screen-w) + var(--pad) * 2);
    height: calc(var(--screen-h) + var(--pad) * 2);
    border-radius: 48px;
    background: #1c1c1e;
    padding: var(--pad);
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 0 3px #2c2c2e,
      inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .iphone .screen {
    width: var(--screen-w);
    height: var(--screen-h);
    border-radius: 36px;
    overflow: hidden;
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    position: relative;
  }

  .iphone .screen::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    z-index: 5;
    pointer-events: none;
  }

  .iphone .notch {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 20px;
    background: #1c1c1e;
    border-radius: 12px;
    z-index: 10;
  }

  .iphone .notch::before {
    content: '';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #0a2540;
    border: 1.5px solid #1a3a5c;
  }

  .iphone iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--device-w);
    height: var(--device-h);
    border: none;
    outline: none;
    display: block;
    transform: scale(var(--scale));
    transform-origin: top left;
    background: #1d4ed8;
  }

  .iphone::before {
    content: '';
    position: absolute;
    right: -3px;
    top: 130px;
    width: 3px;
    height: 44px;
    background: #3a3a3c;
    border-radius: 0 2px 2px 0;
  }

  .iphone::after {
    content: '';
    position: absolute;
    left: -3px;
    top: 110px;
    width: 3px;
    height: 28px;
    background: #3a3a3c;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 40px 0 #3a3a3c, 0 70px 0 #3a3a3c;
  }

  /* ========== Samsung Galaxy S24 ========== */
  /* Real: 360×780, scale 0.72 → screen 259×562 → frame 259+20=279, 562+20=582 */
  .android {
    --scale: 0.72;
    --device-w: 360px;
    --device-h: 780px;
    --pad: 10px;
    --screen-w: calc(var(--device-w) * var(--scale));
    --screen-h: calc(var(--device-h) * var(--scale));
    width: calc(var(--screen-w) + var(--pad) * 2);
    height: calc(var(--screen-h) + var(--pad) * 2);
    border-radius: 34px;
    background: #2c2c2e;
    padding: var(--pad);
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 0 2.5px #3a3a3c,
      inset 0 0 0 1px rgba(255,255,255,0.03);
  }

  .android .screen {
    width: var(--screen-w);
    height: var(--screen-h);
    border-radius: 26px;
    overflow: hidden;
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    position: relative;
  }

  .android .screen::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    z-index: 5;
    pointer-events: none;
  }

  .android .punch-hole {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #1c1c1e;
    z-index: 10;
    border: 1px solid #0a0a0a;
  }

  .android iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--device-w);
    height: var(--device-h);
    border: none;
    outline: none;
    display: block;
    transform: scale(var(--scale));
    transform-origin: top left;
    background: #1d4ed8;
  }

  .android::before {
    content: '';
    position: absolute;
    right: -2.5px;
    top: 150px;
    width: 2.5px;
    height: 50px;
    background: #4a4a4c;
    border-radius: 0 2px 2px 0;
  }

</style>
</head>
<body>

  <div class="device-wrap" id="iphoneWrap">
    <div class="device-label">iPhone 15 Pro — 393 × 852</div>
    <div class="iphone">
      <div class="screen">
        <div class="notch"></div>
        <iframe src="./index.html"></iframe>
      </div>
    </div>
  </div>

  <div class="device-wrap" id="androidWrap">
    <div class="device-label">Samsung Galaxy S24 — 360 × 780</div>
    <div class="android">
      <div class="screen">
        <div class="punch-hole"></div>
        <iframe src="./index.html"></iframe>
      </div>
    </div>
  </div>

</body>
</html>
