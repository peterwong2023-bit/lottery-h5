<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能提醒 - 开奖网</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="reminder.css">
    <link rel="stylesheet" href="notification.css">
</head>
<body class="reminder-page">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-time" id="statusTime">16:50</div>
        <div class="status-icons">
            <svg class="signal" viewBox="0 0 24 24"><path d="M2 20h2V10H2v10zm4 0h2V7H6v13zm4 0h2V4h-2v16zm4 0h2V10h-2v10zm4 0h2V7h-2v13z"/></svg>
            <svg class="wifi" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 0 0-6 0zm-4-4l2 2a7.074 7.074 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="battery">85%</span>
        </div>
    </div>

    <!-- 顶部导航 -->
    <header class="page-header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1 class="header-title">智能提醒</h1>
        <div style="width:40px"></div>
    </header>

    <!-- 模拟测试通知 -->
    <div class="notif-test-bar">
        <button class="notif-test-btn test-draw" onclick="testDrawNotif()">
            <span class="test-icon">🔔</span>
            测试开奖提醒
        </button>
        <button class="notif-test-btn test-dragon" onclick="testDragonNotif()">
            <span class="test-icon">🐉</span>
            测试长龙提醒
        </button>
        <button class="notif-test-btn test-road" onclick="testRoadNotif()">
            <span class="test-icon">🛤️</span>
            测试好路提醒
        </button>
    </div>

    <!-- Tab栏 -->
    <div class="remind-tabs">
        <button class="remind-tab active" data-tab="draw">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>开奖提醒</span>
        </button>
        <button class="remind-tab" data-tab="dragon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            <span>长龙提醒</span>
        </button>
        <button class="remind-tab" data-tab="goodroad">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 16 12 12 8 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            <span>好路提醒</span>
        </button>
    </div>

    <!-- ==================== Tab 1: 开奖提醒 ==================== -->
    <div class="tab-panel active" id="panelDraw">
        <!-- 总开关 -->
        <div class="global-switch">
            <div class="switch-left">
                <div class="switch-icon draw-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </div>
                <div class="switch-info">
                    <span class="switch-title">开奖提醒</span>
                    <span class="switch-desc">低频彩开奖前推送通知</span>
                </div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="drawToggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- 提醒设置 -->
        <div class="settings-card">
            <div class="settings-title">提醒设置</div>
            <div class="setting-item">
                <span class="setting-label">提前提醒时间</span>
                <div class="setting-select" id="drawTimeSelect">
                    <span class="select-value" id="drawTimeValue">5分钟</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </div>
            <div class="setting-item">
                <span class="setting-label">提醒方式</span>
                <div class="setting-tags" id="drawMethodTags">
                    <span class="setting-tag active" data-method="push">推送通知</span>
                    <span class="setting-tag active" data-method="sound">声音</span>
                    <span class="setting-tag" data-method="vibrate">震动</span>
                </div>
            </div>
        </div>

        <!-- 已开启列表 -->
        <div class="reminder-section">
            <div class="section-header">
                <span class="section-title">已开启提醒 <strong id="drawCount">0</strong></span>
                <button class="section-add-btn" id="drawAddBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    添加
                </button>
            </div>
            <div class="reminder-list" id="drawList">
                <!-- JS动态生成 -->
            </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="drawEmpty" style="display:none">
            <div class="empty-icon">🔔</div>
            <p class="empty-title">暂无开奖提醒</p>
            <p class="empty-desc">添加低频彩种，开奖前自动提醒您</p>
            <button class="empty-add-btn" id="drawEmptyAdd">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加提醒
            </button>
        </div>
    </div>

    <!-- ==================== Tab 2: 长龙提醒 ==================== -->
    <div class="tab-panel" id="panelDragon">
        <!-- 总开关 -->
        <div class="global-switch">
            <div class="switch-left">
                <div class="switch-icon dragon-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <div class="switch-info">
                    <span class="switch-title">长龙提醒</span>
                    <span class="switch-desc">连开达阈值时推送提醒</span>
                </div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="dragonToggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- 触发条件 -->
        <div class="settings-card">
            <div class="settings-title">触发条件</div>
            <div class="setting-item">
                <span class="setting-label">连开期数</span>
                <div class="setting-tags" id="dragonThresholdTags">
                    <span class="setting-tag" data-value="3">≥3期</span>
                    <span class="setting-tag active" data-value="4">≥4期</span>
                    <span class="setting-tag" data-value="5">≥5期</span>
                    <span class="setting-tag" data-value="6">≥6期</span>
                </div>
            </div>
            <div class="setting-item">
                <span class="setting-label">监控类型</span>
                <div class="setting-tags multi" id="dragonTypeTags">
                    <span class="setting-tag active" data-value="bigsmall">大小</span>
                    <span class="setting-tag active" data-value="oddeven">单双</span>
                    <span class="setting-tag" data-value="dragontiger">龙虎</span>
                    <span class="setting-tag" data-value="sum">总和</span>
                </div>
            </div>
        </div>

        <!-- 监控彩种列表 -->
        <div class="reminder-section">
            <div class="section-header">
                <span class="section-title">监控彩种 <strong id="dragonCount">0</strong></span>
                <button class="section-add-btn" id="dragonAddBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    添加
                </button>
            </div>
            <div class="reminder-list" id="dragonList">
                <!-- JS动态生成 -->
            </div>
        </div>

        <!-- 最近提醒 -->
        <div class="history-section">
            <div class="section-header">
                <span class="section-title">📋 最近提醒</span>
            </div>
            <div class="history-timeline" id="dragonHistory">
                <!-- JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- ==================== Tab 3: 好路提醒 ==================== -->
    <div class="tab-panel" id="panelGoodroad">
        <!-- 总开关 -->
        <div class="global-switch">
            <div class="switch-left">
                <div class="switch-icon road-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 16 12 12 8 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                </div>
                <div class="switch-info">
                    <span class="switch-title">好路提醒</span>
                    <span class="switch-desc">检测到好路模式时推送提醒</span>
                </div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="goodroadToggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- 监控路型 -->
        <div class="settings-card">
            <div class="settings-title">监控路型</div>
            <div class="setting-item road-patterns">
                <div class="setting-tags multi wrap" id="roadPatternTags">
                    <span class="setting-tag active" data-value="dragon">长龙</span>
                    <span class="setting-tag" data-value="jump">单跳</span>
                    <span class="setting-tag active" data-value="max3">不过三</span>
                    <span class="setting-tag" data-value="2room2hall">两房两厅</span>
                    <span class="setting-tag active" data-value="longchain">连续长连</span>
                    <span class="setting-tag" data-value="chain">常连</span>
                    <span class="setting-tag" data-value="frequent">常跳</span>
                </div>
            </div>
        </div>

        <!-- 监控彩种列表 -->
        <div class="reminder-section">
            <div class="section-header">
                <span class="section-title">监控彩种 <strong id="roadCount">0</strong></span>
                <button class="section-add-btn" id="roadAddBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    添加
                </button>
            </div>
            <div class="reminder-list" id="roadList">
                <!-- JS动态生成 -->
            </div>
        </div>

        <!-- 最近提醒 -->
        <div class="history-section">
            <div class="section-header">
                <span class="section-title">📋 最近提醒</span>
            </div>
            <div class="history-timeline" id="roadHistory">
                <!-- JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- ==================== 添加弹窗(通用) ==================== -->
    <div class="add-modal" id="addModal">
        <div class="modal-mask"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加提醒</h3>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- JS动态生成 -->
            </div>
            <div class="modal-footer">
                <button class="confirm-btn" id="confirmAdd">确认添加</button>
            </div>
        </div>
    </div>

    <!-- 提前时间选择弹窗 -->
    <div class="picker-modal" id="pickerModal">
        <div class="picker-mask"></div>
        <div class="picker-content">
            <div class="picker-header">
                <button class="picker-cancel" id="pickerCancel">取消</button>
                <span class="picker-title">提前提醒时间</span>
                <button class="picker-confirm" id="pickerConfirm">确定</button>
            </div>
            <div class="picker-body" id="pickerBody">
                <div class="picker-option" data-value="1">1分钟前</div>
                <div class="picker-option" data-value="3">3分钟前</div>
                <div class="picker-option active" data-value="5">5分钟前</div>
                <div class="picker-option" data-value="10">10分钟前</div>
                <div class="picker-option" data-value="15">15分钟前</div>
                <div class="picker-option" data-value="30">30分钟前</div>
            </div>
        </div>
    </div>

    <script src="notification.js"></script>
    <script src="reminder.js"></script>
</body>
</html>
