<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录 - 开奖网</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="auth-page">
    <!-- 状态栏 -->
    <div class="status-bar auth-status">
        <div class="status-time" id="statusTime">16:50</div>
        <div class="status-icons">
            <svg class="signal" viewBox="0 0 24 24"><path d="M2 20h2V10H2v10zm4 0h2V7H6v13zm4 0h2V4h-2v16zm4 0h2V10h-2v10zm4 0h2V7h-2v13z"/></svg>
            <svg class="wifi" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 0 0-6 0zm-4-4l2 2a7.074 7.074 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="battery">85%</span>
        </div>
    </div>

    <!-- 背景装饰 -->
    <div class="auth-bg">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <div class="bg-circle c3"></div>
        <div class="bg-wave"></div>
    </div>

    <!-- 关闭按钮 -->
    <button class="close-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <!-- 主内容 -->
    <div class="auth-container">
        <!-- Logo区域 -->
        <div class="auth-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="14" fill="white"/>
                    <circle cx="16" cy="16" r="4" fill="#3b82f6"/>
                    <circle cx="32" cy="16" r="4" fill="#ef4444"/>
                    <circle cx="16" cy="32" r="4" fill="#10b981"/>
                    <circle cx="32" cy="32" r="4" fill="#f59e0b"/>
                    <circle cx="24" cy="24" r="3" fill="#8b5cf6"/>
                </svg>
            </div>
            <h1 class="logo-title">开奖网</h1>
            <p class="logo-subtitle">专业彩票数据分析平台</p>
        </div>

        <!-- 登录表单卡片 -->
        <div class="auth-card">
            <div class="card-header">
                <h2>手机号登录</h2>
                <p>未注册的手机号将自动创建账号</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                        <span class="area-code">+86</span>
                        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper sms-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <path d="M22 4L12 13 2 4"></path>
                        </svg>
                        <input type="text" class="form-input" id="smsCode" placeholder="请输入验证码" maxlength="6" inputmode="numeric">
                        <button type="button" class="sms-btn" id="sendSms">获取验证码</button>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-text">登录 / 注册</span>
                    <div class="btn-loading" style="display:none">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>
        </div>

        <!-- 协议 -->
        <div class="auth-agreement">
            <label class="agree-check">
                <input type="checkbox" id="agreeTerms" checked>
                <span>我已阅读并同意</span>
            </label>
            <a href="#">《用户协议》</a>
            <span>和</span>
            <a href="#">《隐私政策》</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
