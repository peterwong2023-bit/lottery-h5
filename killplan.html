<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>杀号计划 - 开奖网</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="killplan.css">
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-time" id="statusTime">16:50</div>
        <div class="status-icons">
            <svg class="signal" viewBox="0 0 24 24"><path d="M2 20h2V10H2v10zm4 0h2V7H6v13zm4 0h2V4h-2v16zm4 0h2V10h-2v10zm4 0h2V7h-2v13z"/></svg>
            <svg class="wifi" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 0 0-6 0zm-4-4l2 2a7.074 7.074 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="battery">85%</span>
        </div>
    </div>

    <!-- 顶部导航 -->
    <header class="header">
        <a href="index.html" class="header-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <h1 class="header-title">杀号计划</h1>
        <button class="header-action" id="lotterySelectBtn">
            <span id="currentLotteryName">快三</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </button>
    </header>

    <!-- 彩种选择弹窗 -->
    <div class="lottery-modal" id="lotteryModal">
        <div class="modal-overlay"></div>
        <div class="modal-panel">
            <div class="modal-header">
                <span>选择彩种</span>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="lottery-grid" id="lotteryGrid">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 页面内容 -->
    <main class="killplan-page">
        <!-- 当前期数信息卡片 -->
        <div class="period-card">
            <div class="period-left">
                <div class="lottery-badge" id="lotteryBadge">
                    <span>快三</span>
                </div>
                <div class="period-info">
                    <div class="period-title" id="periodTitle">快三 · 杀号计划</div>
                    <div class="period-num">当前第 <span id="currentPeriod">030350</span> 期</div>
                </div>
            </div>
            <div class="countdown-box">
                <span class="countdown-label">距下期开奖</span>
                <span class="countdown-time" id="countdown">00:45</span>
            </div>
        </div>

        <!-- 筛选标签 -->
        <div class="filter-bar">
            <div class="filter-tabs">
                <button class="filter-tab active" data-type="all">综合</button>
                <button class="filter-tab" data-type="bigsmall">大小</button>
                <button class="filter-tab" data-type="oddeven">单双</button>
                <button class="filter-tab" data-type="sum">和值</button>
            </div>
            <div class="filter-row">
                <div class="filter-group">
                    <label>期数</label>
                    <select id="periodCount">
                        <option value="10">最后10期</option>
                        <option value="20" selected>最后20期</option>
                        <option value="50">最后50期</option>
                        <option value="100">最后100期</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>日期</label>
                    <input type="date" id="filterDate" value="2026-02-28">
                </div>
            </div>
        </div>

        <!-- 专家排行 -->
        <div class="experts-section">
            <div class="section-header">
                <h3>🏆 专家推荐</h3>
                <span class="section-sub">已验证 <strong id="verifiedCount">354</strong> 期</span>
            </div>
            <div class="experts-list" id="expertsList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 杀号记录表格 -->
        <div class="table-section">
            <div class="section-header">
                <h3>📊 杀号记录</h3>
                <div class="legend">
                    <span class="legend-item"><span class="dot success"></span>杀对</span>
                    <span class="legend-item"><span class="dot error"></span>杀错</span>
                    <span class="legend-item"><span class="dot pending"></span>待开</span>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="killplan-table">
                    <thead>
                        <tr id="tableHeader">
                            <th class="col-period">期号</th>
                            <th class="col-result">开奖</th>
                            <!-- 动态生成专家列 -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12.5V19a2 2 0 002 2h10a2 2 0 002-2v-6.5"/>
                    <path d="M3 12l9-9 9 9"/>
                    <path d="M14 21v-4a2 2 0 00-4 0v4"/>
                </svg>
            </div>
            <span>首页</span>
        </a>
        <a href="trend.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 7 16 12 12 8 2 17"/>
                    <polyline points="16 7 22 7 22 13"/>
                </svg>
            </div>
            <span>走势</span>
        </a>
        <a href="roadmap.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="3" y1="15" x2="21" y2="15"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                </svg>
            </div>
            <span>路子图</span>
        </a>
        <a href="me.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M5 21a7 7 0 0114 0"/>
                </svg>
            </div>
            <span>我的</span>
        </a>
    </nav>

    <script src="killplan.js"></script>
</body>
</html>
