<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的收藏 - 开奖网</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="favorites.css">
</head>
<body class="favorites-page">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-time" id="statusTime">16:50</div>
        <div class="status-icons">
            <svg class="signal" viewBox="0 0 24 24"><path d="M2 20h2V10H2v10zm4 0h2V7H6v13zm4 0h2V4h-2v16zm4 0h2V10h-2v10zm4 0h2V7h-2v13z"/></svg>
            <svg class="wifi" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 0 0-6 0zm-4-4l2 2a7.074 7.074 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="battery">85%</span>
        </div>
    </div>

    <!-- 顶部导航 -->
    <header class="page-header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1 class="header-title">我的收藏</h1>
        <button class="edit-btn" id="editBtn">
            <span class="edit-text">编辑</span>
        </button>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 收藏统计 -->
        <div class="fav-stats">
            <span class="fav-count">已收藏 <strong id="favTotal">0</strong> 个彩种</span>
            <button class="add-btn" id="addFavBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>添加</span>
            </button>
        </div>

        <!-- 收藏列表 -->
        <div class="fav-list" id="favList">
            <!-- JS动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">
                <svg viewBox="0 0 80 80" fill="none">
                    <circle cx="40" cy="40" r="36" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
                    <path d="M40 25L43.09 31.26L50 32.27L45 37.14L46.18 44.02L40 40.77L33.82 44.02L35 37.14L30 32.27L36.91 31.26L40 25Z" stroke="#d1d5db" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <p class="empty-title">暂无收藏</p>
            <p class="empty-desc">点击下方按钮添加您关注的彩种</p>
            <button class="empty-add-btn" id="emptyAddBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                添加收藏
            </button>
        </div>
    </main>

    <!-- 添加收藏弹窗 -->
    <div class="add-modal" id="addModal">
        <div class="modal-mask"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加收藏</h3>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- JS动态生成彩种列表 -->
            </div>
            <div class="modal-footer">
                <button class="confirm-btn" id="confirmAdd">确认添加</button>
            </div>
        </div>
    </div>

    <script src="favorites.js"></script>
</body>
</html>
