                        </svg>
                    </div>
                    <div class="cache-summary-info">
                        <div class="cache-summary-label">已用缓存</div>
                        <div class="cache-summary-size" id="cacheTotalSize">0 KB</div>
                    </div>
                </div>
                <div class="cache-summary-bar-wrap">
                    <div class="cache-summary-bar">
                        <div class="cache-summary-bar-fill" id="cacheBarFill"></div>
                    </div>
                    <div class="cache-summary-bar-text">
                        <span id="cachePercent">0%</span>
                        <span>5 MB</span>
                    </div>
                </div>
            </div>
            <!-- 分类列表 -->
            <div class="cache-list-title">缓存分类</div>
            <div class="cache-list" id="cacheList"></div>
            <!-- 操作按钮 -->
            <div class="cache-actions">
                <button class="cache-btn-clear" onclick="clearAllCache()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    一键清除全部缓存
                </button>
            </div>
        </div>
    </div>

    <script src="me.js"></script>
</body>
</html>
