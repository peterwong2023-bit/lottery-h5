<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>好路推荐 - 开奖网</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="goodroad.css">
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-time" id="statusTime">16:50</div>
        <div class="status-icons">
            <svg class="signal" viewBox="0 0 24 24"><path d="M2 20h2V10H2v10zm4 0h2V7H6v13zm4 0h2V4h-2v16zm4 0h2V10h-2v10zm4 0h2V7h-2v13z"/></svg>
            <svg class="wifi" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 0 0-6 0zm-4-4l2 2a7.074 7.074 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="battery">85%</span>
        </div>
    </div>

    <!-- 顶部导航 -->
    <header class="header">
        <a href="index.html" class="header-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <h1 class="header-title">好路推荐</h1>
        <button class="header-help" id="helpBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </button>
    </header>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="filter-scroll">
            <button class="filter-chip lottery-filter-btn" id="btnLotteryFilter">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M10 18h4"/></svg>
                <span id="lotteryFilterLabel">彩种筛选</span>
            </button>
            <span class="filter-divider"></span>
            <button class="filter-chip active" data-type="dragon">长龙</button>
            <button class="filter-chip" data-type="jump">单跳</button>
            <button class="filter-chip" data-type="2room2hall">两房两厅</button>
            <button class="filter-chip" data-type="2room1hall">两房一厅</button>
            <button class="filter-chip" data-type="longchain">连续长连</button>
            <button class="filter-chip" data-type="max3">不过三</button>
            <button class="filter-chip" data-type="chain">常连</button>
            <button class="filter-chip" data-type="frequent">常跳</button>
        </div>
    </div>

    <!-- 彩种筛选弹窗 -->
    <div class="lottery-filter-modal" id="lotteryFilterModal">
        <div class="lottery-filter-overlay"></div>
        <div class="lottery-filter-sheet">
            <div class="lottery-filter-header">
                <h3>彩种筛选</h3>
                <div class="lottery-filter-actions">
                    <button class="btn-text" id="btnH5SelectAll">全选</button>
                    <button class="btn-text" id="btnH5ClearAll">清空</button>
                </div>
                <button class="lottery-filter-close" id="btnFilterClose">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="lottery-filter-body" id="lotteryFilterBody">
                <!-- JS 生成 -->
            </div>
            <div class="lottery-filter-footer">
                <button class="btn-confirm" id="btnFilterConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 好路卡片列表 -->
    <div class="goodroad-page">
        <div class="goodroad-list" id="goodroadList">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 底部Tab导航 -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12.5V19a2 2 0 002 2h10a2 2 0 002-2v-6.5"/>
                    <path d="M3 12l9-9 9 9"/>
                    <path d="M14 21v-4a2 2 0 00-4 0v4"/>
                </svg>
            </div>
            <span>首页</span>
        </a>
        <a href="trend.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 7 16 12 12 8 2 17"/>
                    <polyline points="16 7 22 7 22 13"/>
                </svg>
            </div>
            <span>走势</span>
        </a>
        <a href="roadmap.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="3" y1="15" x2="21" y2="15"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                </svg>
            </div>
            <span>路子图</span>
        </a>
        <a href="me.html" class="tab-bar-item">
            <div class="tab-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M5 21a7 7 0 0114 0"/>
                </svg>
            </div>
            <span>我的</span>
        </a>
    </nav>

    <!-- 形态说明弹窗 -->
    <div class="help-modal" id="helpModal">
        <div class="help-overlay"></div>
        <div class="help-panel">
            <div class="help-header">
                <h3>形态说明</h3>
                <button class="help-close" id="helpClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="help-content">
                <div class="help-item">
                    <span class="help-name">长龙</span>
                    <span class="help-desc">连续出现相同结果4次以上</span>
                </div>
                <div class="help-item">
                    <span class="help-name">单跳</span>
                    <span class="help-desc">两种结果交替出现</span>
                </div>
                <div class="help-item">
                    <span class="help-name">两房两厅</span>
                    <span class="help-desc">AABB形态循环</span>
                </div>
                <div class="help-item">
                    <span class="help-name">两房一厅</span>
                    <span class="help-desc">AAB或ABB形态</span>
                </div>
                <div class="help-item">
                    <span class="help-name">连续长连</span>
                    <span class="help-desc">出现连续的长龙形态</span>
                </div>
                <div class="help-item">
                    <span class="help-name">不过三</span>
                    <span class="help-desc">同一结果不超过3次</span>
                </div>
                <div class="help-item">
                    <span class="help-name">常连</span>
                    <span class="help-desc">经常出现连续相同</span>
                </div>
                <div class="help-item">
                    <span class="help-name">常跳</span>
                    <span class="help-desc">经常出现结果切换</span>
                </div>
            </div>
        </div>
    </div>

    <script src="goodroad.js"></script>
</body>
</html>
