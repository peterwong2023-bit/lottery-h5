<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>浏览记录 - 开奖网</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="history.css">
</head>
<body class="history-page">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-time" id="statusTime">16:50</div>
        <div class="status-icons">
            <svg class="signal" viewBox="0 0 24 24"><path d="M2 20h2V10H2v10zm4 0h2V7H6v13zm4 0h2V4h-2v16zm4 0h2V10h-2v10zm4 0h2V7h-2v13z"/></svg>
            <svg class="wifi" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 0 0-6 0zm-4-4l2 2a7.074 7.074 0 0 1 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="battery">85%</span>
        </div>
    </div>

    <!-- 顶部导航 -->
    <header class="page-header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <h1 class="header-title">浏览记录</h1>
        <button class="clear-btn" id="clearAllBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span>清空</span>
        </button>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 分类筛选 -->
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="all">全部</button>
            <button class="filter-tab" data-filter="lottery">开奖</button>
            <button class="filter-tab" data-filter="trend">走势</button>
            <button class="filter-tab" data-filter="roadmap">路子图</button>
            <button class="filter-tab" data-filter="killplan">杀号</button>
            <button class="filter-tab" data-filter="news">新闻</button>
            <button class="filter-tab" data-filter="goodroad">好路</button>
        </div>

        <!-- 记录列表 -->
        <div class="history-list" id="historyList">
            <!-- JS动态生成 -->
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">
                <svg viewBox="0 0 80 80" fill="none">
                    <circle cx="40" cy="40" r="36" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
                    <circle cx="40" cy="40" r="14" stroke="#d1d5db" stroke-width="2"/>
                    <polyline points="40 30 40 40 48 44" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <p class="empty-title">暂无浏览记录</p>
            <p class="empty-desc">您浏览过的内容将会显示在这里</p>
        </div>
    </main>

    <!-- 清空确认弹窗 -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-mask"></div>
        <div class="confirm-dialog">
            <div class="confirm-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <h3 class="confirm-title">确认清空</h3>
            <p class="confirm-desc">清空后将无法恢复，是否继续？</p>
            <div class="confirm-actions">
                <button class="cancel-btn" id="cancelClear">取消</button>
                <button class="delete-btn" id="confirmClear">清空</button>
            </div>
        </div>
    </div>

    <script src="history.js"></script>
</body>
</html>
